services:
  postgres:
    image: postgres:16
    container_name: musicpulse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: musicpulse
      POSTGRES_USER: musicpulse
      POSTGRES_PASSWORD: musicpulse_pwd
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # scripts opcionais: tudo que estiver em ./database/init vai rodar no 1o boot
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicpulse -d musicpulse"]
      interval: 5s
      timeout: 3s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: musicpulse_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: admin_pwd
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pg_data:
  pgadmin_data: